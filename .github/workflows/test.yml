name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          # Some unit tests transitively import manim through scene modules.
          # Install the full requirements; integration tests are still skipped.
          pip install -r backend/requirements.txt
          pip install pytest pytest-mock

      - name: Run unit tests (no integration)
        env:
          PYTHONPATH: backend
        run: |
          pytest backend/tests/ -m "not integration" -q

  frontend:
    name: Frontend type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Enforce bundle-size budgets
        # Budgets in kB (raw size). Adjust intentionally — every increase
        # should be reviewed in the PR. Current production state (Phase F
        # build): main JS ~345, main CSS ~12. Headroom of ~150 kB on JS.
        env:
          MAIN_JS_BUDGET_KB: 500
          MAIN_CSS_BUDGET_KB: 50
          MAIN_JS_GZIP_BUDGET_KB: 150
        run: |
          set -euo pipefail
          # Largest "index-*" chunk is the main entry by Vite default
          MAIN_JS=$(find dist/assets -name 'index-*.js' -type f | head -1)
          MAIN_CSS=$(find dist/assets -name 'index-*.css' -type f | head -1)
          if [ -z "$MAIN_JS" ] || [ -z "$MAIN_CSS" ]; then
            echo "::error::Could not find main JS or CSS chunk in dist/assets/"
            ls -la dist/assets/ | head -20
            exit 1
          fi

          JS_BYTES=$(stat -c '%s' "$MAIN_JS")
          CSS_BYTES=$(stat -c '%s' "$MAIN_CSS")
          GZIP_BYTES=$(gzip -c "$MAIN_JS" | wc -c)

          JS_KB=$((JS_BYTES / 1024))
          CSS_KB=$((CSS_BYTES / 1024))
          GZIP_KB=$((GZIP_BYTES / 1024))

          echo "Main JS:        ${JS_KB} kB (raw) / ${GZIP_KB} kB (gzip)"
          echo "Main CSS:       ${CSS_KB} kB"
          echo "Budgets:        JS=${MAIN_JS_BUDGET_KB} kB  CSS=${MAIN_CSS_BUDGET_KB} kB  JS gzip=${MAIN_JS_GZIP_BUDGET_KB} kB"

          FAIL=0
          if [ "$JS_KB" -gt "$MAIN_JS_BUDGET_KB" ]; then
            echo "::error::Main JS exceeded ${MAIN_JS_BUDGET_KB} kB raw budget (got ${JS_KB} kB)"
            FAIL=1
          fi
          if [ "$GZIP_KB" -gt "$MAIN_JS_GZIP_BUDGET_KB" ]; then
            echo "::error::Main JS exceeded ${MAIN_JS_GZIP_BUDGET_KB} kB gzip budget (got ${GZIP_KB} kB)"
            FAIL=1
          fi
          if [ "$CSS_KB" -gt "$MAIN_CSS_BUDGET_KB" ]; then
            echo "::error::Main CSS exceeded ${MAIN_CSS_BUDGET_KB} kB budget (got ${CSS_KB} kB)"
            FAIL=1
          fi
          exit $FAIL
